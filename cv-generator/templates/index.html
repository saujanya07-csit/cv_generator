<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cv generator — Build Your Perfect CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo">
     
      <span class="logo-text">CV<span class="logo-dot"></span>Generator</span>
    </div>
    <nav class="header-nav">
      <button class="nav-btn active" data-panel="form">Builder</button>
      <button class="nav-btn" data-panel="preview">Preview</button>
    </nav>
    <div class="header-actions">
      <div class="template-picker">
        <label>Template</label>
        <select id="templateSelect">
          <option value="default">Default</option>
        </select>
      </div>
    </div>
  </div>
</header>

<!-- ── Main Layout ─────────────────────────────────────────────────────────── -->
<main class="app-layout">

  <!-- LEFT: Form Panel -->
  <section class="panel panel-form active" id="panel-form">
    <div class="panel-scroll">
      <form id="cvForm" novalidate>

        <!-- Section: Personal Info -->
        <div class="form-section">
          <div class="section-label">
            <span class="section-number">01</span>
            <h2>Personal Info</h2>
          </div>
          <div class="field-grid two-col">
            <div class="field">
              <label for="name">Full Name <span class="req">*</span></label>
              <input type="text" id="name" name="name" placeholder="Alex Morgan" required />
            </div>
            <div class="field">
              <label for="email">Email <span class="req">*</span></label>
              <input type="email" id="email" name="email" placeholder="alex@example.com" required />
            </div>
            <div class="field">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone" placeholder="+1 555 000 0000" />
            </div>
            <div class="field">
              <label for="linkedin">LinkedIn</label>
              <input type="text" id="linkedin" name="linkedin" placeholder="linkedin.com/in/alex" />
            </div>
            <div class="field full">
              <label for="address">Address</label>
              <input type="text" id="address" name="address" placeholder="City, Country" />
            </div>
            <div class="field full">
              <label for="github">GitHub / Portfolio</label>
              <input type="text" id="github" name="github" placeholder="github.com/alex" />
            </div>
            <div class="field full">
              <label for="summary">Professional Summary <span class="hint">(AI will generate if empty)</span></label>
              <textarea id="summary" name="summary" rows="3" placeholder="Briefly describe yourself..."></textarea>
            </div>
          </div>
        </div>

        <!-- Section: Skills -->
        <div class="form-section">
          <div class="section-label">
            <span class="section-number">02</span>
            <h2>Skills to me</h2>
          </div>
          <div class="field full">
            <label for="skills">Skills <span class="hint">(comma separated)</span></label>
            <input type="text" id="skills" name="skills" placeholder="Python, React, SQL, Docker, AWS..." />
            <div class="skill-tags" id="skillTags"></div>
          </div>
        </div>

        <!-- Section: Projects -->
        <div class="form-section">
          <div class="section-label">
            <span class="section-number">03</span>
            <h2>Projects</h2>
          </div>
          <div id="projectsList"></div>
          <button type="button" class="add-btn" id="addProject">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Add Project
          </button>
        </div>

        <!-- Section: Experience -->
        <div class="form-section">
          <div class="section-label">
            <span class="section-number">04</span>
            <h2>Experience</h2>
          </div>
          <div id="experienceList"></div>
          <button type="button" class="add-btn" id="addExperience">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Add Experience
          </button>
        </div>

        <!-- Section: Education -->
        <div class="form-section">
          <div class="section-label">
            <span class="section-number">05</span>
            <h2>Education</h2>
          </div>
          <div id="educationList"></div>
          <button type="button" class="add-btn" id="addEducation">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Add Education
          </button>
        </div>

        <!-- Section: Additional Information -->
        <div class="form-section">
          <div class="section-label">
            <span class="section-number">06</span>
            <h2>Additional Information</h2>
          </div>
          <div class="field full">
            <label for="languages">Languages <span class="hint">(comma separated)</span></label>
            <input type="text" id="languages" name="languages" placeholder="C, C++, Python" />
          </div>
          <div class="field full">
            <label for="developer_tools">Developer Tools <span class="hint">(comma separated)</span></label>
            <input type="text" id="developer_tools" name="developer_tools" placeholder="Git, GitHub, VS Code" />
          </div>
          <div class="field full">
            <label for="certifications">Certifications <span class="hint">(comma separated)</span></label>
            <input type="text" id="certifications" name="certifications"
              placeholder="AWS Solutions Architect, Google Cloud Professional..." />
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="form-actions">
          <button type="button" class="btn btn-primary" id="generateBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 16v-8M8 12h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/></svg>
            Generate CV
          </button>
        </div>

      </form>
    </div>
  </section>

  <!-- RIGHT: Preview Panel -->
  <section class="panel panel-preview" id="panel-preview">
    <div class="preview-toolbar">
      <div class="preview-status" id="previewStatus">
        <span class="status-dot"></span>
        <span>Ready to preview</span>
      </div>
      <div class="preview-actions">
        <button class="toolbar-btn" id="refreshPreview" title="Refresh preview">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 018-8 8 8 0 016.93 4M20 12a8 8 0 01-8 8 8 8 0 01-6.93-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M18 4l2 4h-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="toolbar-btn btn-download" id="downloadBtn" title="Download PDF" disabled>
          <svg width="16" heigh0c8b8315a01402cbc1663f165f36b59f4e6704ee        refs/tags/v1.0.0
7e81347727ccbed4602e0be01b8d82e2f9d878ef        refs/tags/v1.0.1
b21c1ae3cf1393c6f5c0203f07ff9ec2d1658df2        refs/tags/v1.0.2
3fd45eeabf52d35f45567a7a94cbd7ded211b203        refs/tags/v1.0.4
(cv_env) shreya@shreya-vivo:~/Downloads/cv-generator_final/cv-generator$ 

t="16" viewBox="0 0 24 24" fill="none"><path d="M12 4v12M8 12l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Download PDF
        </button>
      </div>
    </div>

    <!-- Preview Frame -->
    <div class="preview-frame-wrapper" id="previewWrapper">
      <div class="preview-empty" id="previewEmpty">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none"><rect x="12" y="8" width="40" height="48" rx="4" stroke="currentColor" stroke-width="2" opacity="0.3"/><path d="M20 20h24M20 28h24M20 36h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3"/></svg>
        <p>Fill in the form and click <strong>Generate CV</strong></p>
      </div>
      <iframe id="previewFrame" style="display:none" title="CV Preview"></iframe>
    </div>
  </section>

</main>

<!-- ── Loading Overlay ─────────────────────────────────────────────────────── -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <p id="loadingMsg">Processing...</p>
  </div>
</div>

<!-- ── Toast ───────────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
