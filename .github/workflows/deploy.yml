name: Versioned Deploy Flask App

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy specific version to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "Deploying version: ${{ github.ref_name }}"

            APP_DIR="/home/cvapp/cv_generator/cv-generator/cv-generator"

            cd "$APP_DIR"

            echo "Fetching latest tags..."
            git fetch origin --tags

            echo "Checking out version..."
            git checkout ${{ github.ref_name }}

            echo "Cleaning old virtual environment..."
            rm -rf venv

            echo "Creating fresh virtual environment..."
            python3 -m venv venv

            echo "Upgrading pip..."
            ./venv/bin/pip install --upgrade pip

            echo "Installing dependencies..."
            ./venv/bin/pip install -r requirements.txt

            echo "Restarting service..."
            sudo systemctl restart cvgen

            echo "Checking status..."
            sudo systemctl status cvgen --no-pager
